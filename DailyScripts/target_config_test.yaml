# 风格暴露参数
factor_explosure_param:
  bench_mark: '000300.XSHG'
  sample_range: 'zz1800'
  factor_start_date: '2019-01-01' # 计算因子时的初始日期
  factor_rolling_window: 252 # rolling的周期

# target参数
parameters:
  'ABCD': # unique_id,每一份通用的target都有一个唯一指定标识
    bench_mark: '000300.XSHG'
    sample_range: 'zz1800'
    max_stock_weight: 0.0125 # 0.0125
    turnover_limit: 0.15
    min_industry: 0.4
    max_industry: 1.0
    fixed_industry_limit: 0.02 # 行业绝对偏离封顶（与 long_short_strategy 一致）
    # 指数±Nσ风格约束（两个浮点数，留空则不启用）
    factor_name: 'avg_rank_4'
    direction: 1
    style_index_bands_sigma_lo: 0.1
    style_index_bands_sigma_hi: 0.1
    # 动态单票上限：max_weight = np.maximum(指数成分权重 * stock_weight_multiplier, stock_weight_fallback)
    # 个股基准权重在 tranform_target.py 中按 generate_index_weights.py 算法本地计算后传入优化器，
    # 无外部权重文件依赖；当本地计算失败时按 stock_weight_fallback (或 max_stock_weight) 作为固定上限。
    stock_weight_multiplier: 1.6
    stock_weight_fallback: 0.0025
    stock_weight_cap: 0.049 # 可选单票权重绝对上限；null 表示不启用
    # （可选）跟踪误差 QP；启用时需要同时配置 stock_returns_path 并保证基准权重计算成功
    # stock_returns_path: ''
    # tracking_error_limit: 0.075
    # vol_rolling_window: 60
    style_index_bands_sigma:
      # 与 PBackTest-dev1-V0915-opt/backtest/long_short_strategy.py 默认配置保持一致
      lcap_exposure: [0.5, 0.5]
      beta_exposure: [1.0, 1.0]
      liquidity_exposure: [0.3, 0.3]
      # srmi_exposure: [1.0, 1.0]
      # nl_size: [1.0, 1.0]
    black_list: 'cms_long_short_black_list_20250714.xlsx'
    forbid_lst: []

  'WBZD': # unique_id,每一份通用的target都有一个唯一指定标识
    bench_mark: '000300.XSHG'
    sample_range: 'zz1800'
    max_stock_weight: 0.0025 # 0.0125
    turnover_limit: 0.15
    min_industry: 0.4
    max_industry: 1.0
    fixed_industry_limit: 0.02
    factor_name: 'avg_rank_4'
    direction: 1
    # style_index_bands_sigma_lo: 0.1
    # style_index_bands_sigma_hi: 0.1
    stock_weight_multiplier: 1.6
    stock_weight_fallback: 0.0025
    stock_weight_cap: null # 可选单票权重绝对上限；null 表示不启用
    style_index_bands_sigma:
      lcap_exposure: [0.5, 0.5]
      beta_exposure: [1.0, 1.0]
      liquidity_exposure: [0.3, 0.3]
      # srmi_exposure: [1.0, 1.0]
      # nl_size: [1.0, 1.0]
    black_list: ''
    forbid_lst: []

  'TCHMD': # unique_id,每一份通用的target都有一个唯一指定标识
    bench_mark: '000300.XSHG'
    sample_range: 'zz1800'
    max_stock_weight: 0.0125 # 0.0125
    turnover_limit: 0.15
    min_industry: 0.4
    max_industry: 1.0
    fixed_industry_limit: 0.02
    factor_name: 'avg_rank_4'
    direction: 1
    style_index_bands_sigma_lo: 0.1
    style_index_bands_sigma_hi: 0.1
    stock_weight_multiplier: 1.6
    stock_weight_fallback: 0.0025
    stock_weight_cap: null # 可选单票权重绝对上限；null 表示不启用
    style_index_bands_sigma:
      lcap_exposure: [0.5, 0.5]
      beta_exposure: [1.0, 1.0]
      liquidity_exposure: [0.3, 0.3]
      # srmi_exposure: [1.0, 1.0]
      # nl_size: [1.0, 1.0]
    black_list: ''
    forbid_lst: ['601015.XSHG', '603058.XSHG', '002945.XSHE', '300755.XSHE', '301093.XSHE'] # 海通信用户需要剔除券商禁止的票
