# ---------- 路径配置 ----------
model_path: 'Y:\trading_pred_df'
target_path: 'E:\code\generate_split_system\data\target'
DATABASE_PATH: 'Y:\Market'
blacklist_path: 'E:\code\generate_split_system\data\raw\blacklist'

# ---------- 模型文件 ----------
# {pre_date} → 前一交易日 (YYYYMMDD)
model_file_pattern: "df_test_PB_V0422_{pre_date}.parquet"

# ---------- 因子暴露参数 ----------
factor_explosure_param:
  bench_mark: "000300.XSHG"
  sample_range: "zz1800"
  factor_start_date: "2019-01-01"
  factor_rolling_window: 252

# ---------- 运行时参数（全部可调，无需改代码） ----------
runtime:
  # -- 黑名单邮件 --
  blacklist_placeholder_date: "20250714"
  blacklist_download_limit: 20
  blacklist_alert_recipients:
    - "15556235305@163.com"
    - "pagududeshengjiang@shpbjj.com"

  # -- 股票筛选阈值 --
  stock_filter:
    min_turnover_ma10: 25000000
    min_market_cap_ma3: 2500000000

  # -- 模型列映射 --
  model_score_column: "Scorpio_ezavg_grouped_scaled"
  model_score_rename: "score"

  # -- 涨跌停比例 --
  limit_ratios:
    innovation_up: 1.1985
    innovation_down: 0.801
    normal_up: 1.0985
    normal_down: 0.901

# ---------- 各 target 的优化参数 ----------
